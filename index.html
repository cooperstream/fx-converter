                ${rows.length ? rows.map((row) => `
                  <button type="button" class="list-row ${selectedCode === row.cc ? 'active' : ''}" data-converter-code="${escapeAttr(row.cc)}">
                    <div class="row-main">
                      <div class="row-code">${escapeHtml(row.cc)}</div>
                      <div class="row-label">${escapeHtml(row.txt)}</div>
                    </div>
                    <div class="row-tag">${selectedCode === row.cc ? 'Обрано' : ''}</div>
                  </button>
                `).join('') : `
                  <article class="inline-state">
                    <h3>Нічого не знайдено</h3>
                    <p>Спробуй інший код або частину назви.</p>
                  </article>
                `}
              </div>
            </div>
          `;
          return;
        }

        const amountNumber = parseInputNumber(state.converter.amount);
        const result = Number.isFinite(amountNumber)
          ? convertAmount(amountNumber, state.converter.from, state.converter.to)
          : null;
        const rateHint = getCrossRate(state.converter.from, state.converter.to, state.currentRates);

        refs.converterBody.innerHTML = `
          <div class="converter-layout">
            <div class="converter-main">
              <article class="input-card">
                <div class="input-label">Сума</div>
                <input class="amount-input" data-amount-input id="converterAmountInput" type="text" inputmode="decimal" autocomplete="off" placeholder="0" value="${escapeAttr(state.converter.amount)}" />
              </article>

              <div class="converter-rows">
                <div class="converter-pair-row">
                  <div class="converter-row">
                    <div class="section-label">З</div>
                    <button class="picker-row compact" type="button" data-picker-open="from">
                      <div class="row-main">
                        <div class="row-code">${escapeHtml(state.converter.from)}</div>
                      </div>
                      <div class="picker-row-arrow">›</div>
                    </button>
                  </div>

                  <div class="swap-wrap">
                    <button class="swap-btn" type="button" data-swap aria-label="Поміняти валюту місцями">⇅</button>
                  </div>

                  <div class="converter-row">
                    <div class="section-label">В</div>
                    <button class="picker-row compact" type="button" data-picker-open="to">
                      <div class="row-main">
                        <div class="row-code">${escapeHtml(state.converter.to)}</div>
                      </div>
                      <div class="picker-row-arrow">›</div>
                    </button>
                  </div>
                </div>
              </div>

              <article class="result-card">
                <div class="input-label">Результат</div>
                <div class="result-primary" id="converterResultLabel">${result === null ? '—' : `${formatAmount(result)} ${escapeHtml(state.converter.to)}`}</div>
                <div class="result-secondary" id="converterHintLabel">${Number.isFinite(amountNumber) ? `${formatAmount(amountNumber)} ${escapeHtml(state.converter.from)} = ${formatAmount(result)} ${escapeHtml(state.converter.to)}` : 'Введи суму для розрахунку.'}</div>
                <div class="result-secondary">1 ${escapeHtml(state.converter.from)} = ${formatRate(rateHint)} ${escapeHtml(state.converter.to)}</div>
              </article>
            </div>
          </div>
        `;
      }

      function updateConverterResultOnly() {
        const resultLabel = document.getElementById('converterResultLabel');
        const hintLabel = document.getElementById('converterHintLabel');
        if (!resultLabel || !hintLabel || !state.currentRates) return;
        const amount = parseInputNumber(state.converter.amount);
        const result = Number.isFinite(amount) ? convertAmount(amount, state.converter.from, state.converter.to) : null;
        resultLabel.textContent = result === null ? '—' : `${formatAmount(result)} ${state.converter.to}`;
        hintLabel.textContent = Number.isFinite(amount)
          ? `${formatAmount(amount)} ${state.converter.from} = ${formatAmount(result)} ${state.converter.to}`
          : 'Введи суму для розрахунку.';
      }

      async function loadDetailHistory(code, force = false) {
        if (!code || !state.currentRates) return;
        const requestId = ++state.detailRequestToken;
        state.detailLoading = true;
        state.detailError = null;
        state.detailSeries = [];
        state.chartActiveIndex = null;
        renderDetailBody();

        try {
          await ensureHistoryReady(code, state.detailPeriod, force);
          if (state.baseCurrency !== 'UAH' && state.baseCurrency !== code) {
            await ensureHistoryReady(state.baseCurrency, state.detailPeriod, force);
          }
          if (requestId !== state.detailRequestToken) return;
          state.detailSeries = buildSeriesForDetail(code, state.baseCurrency, state.detailPeriod);
          state.detailLoading = false;
          state.detailError = null;
        } catch (error) {
          if (requestId !== state.detailRequestToken) return;
          state.detailLoading = false;
          state.detailError = error?.message || 'Не вдалося отримати історію.';
        }

        if (requestId === state.detailRequestToken) {
          renderDetailBody();
        }
      }

      function historyCacheKey(code, periodKey) {
        return `${code}:${periodKey}`;
      }

      function buildHistorySampleDates(endDate, periodKey) {
        const plan = PERIOD_FETCH_PLAN[periodKey] || PERIOD_FETCH_PLAN['1M'];
        const dates = [];

        for (let offset = plan.spanDays - 1; offset >= 0; offset -= plan.stepDays) {
          const date = new Date(endDate.getTime());
          date.setDate(date.getDate() - offset);
          dates.push(date);
        }

        const lastDate = dates[dates.length - 1];
        if (!lastDate || formatApiDate(lastDate) !== formatApiDate(endDate)) {
          dates.push(new Date(endDate.getTime()));
        }

        const seen = new Set();
        return dates.filter((date) => {
          const key = formatApiDate(date);
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      async function loadRatesSnapshot(targetDate, force = false) {
        const requestedKey = formatApiDate(targetDate);
        if (!force && state.dayRatesCache.has(requestedKey)) return state.dayRatesCache.get(requestedKey);

        for (let offset = 0; offset <= 4; offset += 1) {
          const probeDate = new Date(targetDate.getTime());
          probeDate.setDate(probeDate.getDate() - offset);
          const probeKey = formatApiDate(probeDate);

          if (!force && state.dayRatesCache.has(probeKey)) {
            const cached = state.dayRatesCache.get(probeKey);
            state.dayRatesCache.set(requestedKey, cached);
            return cached;
          }

          let data;
          try {
            data = await fetchJsonFlexible([BY_DATE_API(probeKey)], `Не вдалося отримати курс НБУ на ${probeKey}.`);
          } catch {
            continue;
          }

          if (Array.isArray(data) && data.length) {
            const normalized = normalizeRatesArray(data);
            normalized.UAH = createUAHRow(data[0]?.exchangedate || formatDisplayDate(probeDate));
            const actualIso = toIsoDate(data[0]?.exchangedate) || probeKeyToIso(probeKey);
            const snapshot = {
              date: actualIso,
              rates: normalized
            };
            state.dayRatesCache.set(probeKey, snapshot);
            state.dayRatesCache.set(requestedKey, snapshot);
            return snapshot;
          }
        }

        state.dayRatesCache.set(requestedKey, null);
        return null;
      }

      function probeKeyToIso(value) {
        if (!value || value.length !== 8) return null;
        return `${value.slice(0, 4)}-${value.slice(4, 6)}-${value.slice(6, 8)}`;
      }

      async function ensureHistoryReady(code, periodKey, force = false) {
        if (code === 'UAH') return;
        const cacheKey = historyCacheKey(code, periodKey);
        if (!force && state.historyCache.has(cacheKey)) return;

        const endDate = state.officialDate ? parseDisplayDate(state.officialDate) : new Date();
        const sampleDates = buildHistorySampleDates(endDate, periodKey);
        const snapshots = await Promise.all(sampleDates.map((date) => loadRatesSnapshot(date, force)));

        const deduped = new Map();
        snapshots.forEach((snapshot) => {
          const row = snapshot?.rates?.[code];
          if (!snapshot || !row || !snapshot.date || !Number.isFinite(Number(row.rate))) return;
          deduped.set(snapshot.date, {
            date: snapshot.date,
            displayDate: row.exchangedate || formatDisplayDate(new Date(`${snapshot.date}T00:00:00`)),
            rateUAH: Number(row.rate),
            txt: row.txt || row.enname || code,
            cc: row.cc || code
          });
        });

        const points = Array.from(deduped.values()).sort((a, b) => a.date.localeCompare(b.date));
        if (!points.length) throw new Error(`Немає історичних даних для ${code}.`);
        state.historyCache.set(cacheKey, points);
      }

      function buildSeriesForDetail(code, base, periodKey) {
        if (code === 'UAH') {
          if (base === 'UAH') return [];
          const baseHistory = state.historyCache.get(historyCacheKey(base, periodKey)) || [];
          return baseHistory
            .map((point) => {
              if (!Number.isFinite(point.rateUAH) || point.rateUAH <= 0) return null;
              return {
                date: point.date,
                displayDate: point.displayDate,
                value: 1 / point.rateUAH
              };
            })
            .filter(Boolean);
        }

        const targetHistory = state.historyCache.get(historyCacheKey(code, periodKey)) || [];
        if (!targetHistory.length) return [];

        if (base === code) {
          return targetHistory.map((point) => ({
            date: point.date,
            displayDate: point.displayDate,
            value: 1
          }));
        }

        const baseMap = base === 'UAH'
          ? null
          : new Map((state.historyCache.get(historyCacheKey(base, periodKey)) || []).map((item) => [item.date, item.rateUAH]));

        return targetHistory
          .map((point) => {
            const denominator = base === 'UAH' ? 1 : baseMap.get(point.date);
            if (!Number.isFinite(denominator) || denominator <= 0) return null;
            return {
              date: point.date,
              displayDate: point.displayDate,
              value: point.rateUAH / denominator
            };
          })
          .filter(Boolean);
      }

      function renderChart(container, series, currencyCode, baseCode) {
        state.chartActiveIndex = clamp(state.chartActiveIndex ?? series.length - 1, 0, series.length - 1);
        const width = Math.max(container.clientWidth || 0, 280);
        const height = 220;
        const padding = { top: 18, right: 12, bottom: 42, left: 58 };
        const plotWidth = width - padding.left - padding.right;
        const plotHeight = height - padding.top - padding.bottom;
        const values = series.map((point) => point.value);
        const min = Math.min(...values);
        const max = Math.max(...values);
        const desiredYTicks = clamp(Math.floor(plotHeight / 46), 3, 6);
        const yScale = buildNiceScale(min, max, desiredYTicks);
        const yMin = yScale.min;
        const yMax = yScale.max;

        const points = series.map((point, index) => {
          const x = padding.left + (plotWidth * index) / Math.max(series.length - 1, 1);
          const y = padding.top + (1 - (point.value - yMin) / Math.max(yMax - yMin, 0.0000001)) * plotHeight;
          return { ...point, x, y };
        });

        const linePath = points.map((point, index) => `${index === 0 ? 'M' : 'L'}${point.x.toFixed(2)},${point.y.toFixed(2)}`).join(' ');
        const areaPath = `${linePath} L${points[points.length - 1].x.toFixed(2)},${(height - padding.bottom).toFixed(2)} L${points[0].x.toFixed(2)},${(height - padding.bottom).toFixed(2)} Z`;

        const activePoint = points[state.chartActiveIndex];
        const finePointer = window.matchMedia('(pointer: fine)').matches;
        const xLabels = buildEvenXAxisLabels(points, padding.left, plotWidth);

        const yLabels = yScale.ticks.map((value) => ({
          y: padding.top + (1 - (value - yMin) / Math.max(yMax - yMin, 0.0000001)) * plotHeight,
          label: formatAxisTickValue(value, yScale.step)
        }));

        container.innerHTML = `
          <svg class="chart-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-label="Графік курсу ${escapeAttr(currencyCode)}">
            <defs>
              <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#0f8f55" stop-opacity="0.22" />
                <stop offset="100%" stop-color="#0f8f55" stop-opacity="0.01" />
              </linearGradient>
            </defs>
            ${yLabels.map((label) => `<line class="chart-grid" x1="${padding.left}" y1="${label.y}" x2="${width - padding.right}" y2="${label.y}" />`).join('')}
            <path class="chart-area-fill" d="${areaPath}" />
            <path class="chart-path" d="${linePath}" />
            ${yLabels.map((label) => `<text class="chart-axis-label" x="${padding.left - 8}" y="${label.y + 3}" text-anchor="end">${escapeHtml(label.label)}</text>`).join('')}
            ${xLabels.map((label) => `<text class="chart-axis-label" x="${label.x}" y="${height - 12}" text-anchor="${label.anchor}">${escapeHtml(label.label)}</text>`).join('')}
            <g id="chartFocusGroup">
              <line class="chart-focus-line" x1="${activePoint.x}" y1="${padding.top}" x2="${activePoint.x}" y2="${height - padding.bottom}" />
              <circle class="chart-focus-dot" cx="${activePoint.x}" cy="${activePoint.y}" r="6" />
            </g>
            <rect class="chart-hit" x="${padding.left}" y="${padding.top}" width="${plotWidth}" height="${plotHeight}" />
          </svg>
        `;

        updateDetailChartLabels();

        const svg = container.querySelector('svg');
        const focusLine = svg?.querySelector('.chart-focus-line');
        const focusDot = svg?.querySelector('.chart-focus-dot');
        const hit = svg?.querySelector('.chart-hit');
        if (!hit || !focusLine || !focusDot) return;

        const moveToIndex = (index) => {
          const safeIndex = clamp(index, 0, points.length - 1);
          state.chartActiveIndex = safeIndex;
          const point = points[safeIndex];
          focusLine.setAttribute('x1', point.x);
          focusLine.setAttribute('x2', point.x);
          focusDot.setAttribute('cx', point.x);
          focusDot.setAttribute('cy', point.y);
          updateDetailChartLabels();
        };

        const getIndexFromEvent = (event) => {
          const rect = hit.getBoundingClientRect();
          const clientX = event.clientX ?? (event.touches && event.touches[0]?.clientX) ?? rect.left;
          const relativeX = clientX - rect.left;
          const ratio = relativeX / rect.width;
          return Math.round(ratio * (points.length - 1));
        };

        if (finePointer) {
          hit.addEventListener('pointermove', (event) => moveToIndex(getIndexFromEvent(event)));
          hit.addEventListener('pointerleave', () => {
            state.chartActiveIndex = points.length - 1;
            moveToIndex(points.length - 1);
          });
        } else {
          let isTouchTracking = false;

          hit.addEventListener('click', (event) => moveToIndex(getIndexFromEvent(event)));

          hit.addEventListener('touchstart', (event) => {
            const touch = event.touches && event.touches[0];
            if (!touch) return;
            isTouchTracking = true;
            moveToIndex(getIndexFromEvent(touch));
            event.preventDefault();
          }, { passive: false });

          hit.addEventListener('touchmove', (event) => {
            if (!isTouchTracking) return;
            const touch = event.touches && event.touches[0];
            if (!touch) return;
            moveToIndex(getIndexFromEvent(touch));
            event.preventDefault();
          }, { passive: false });

          const stopTouchTracking = () => {
            isTouchTracking = false;
          };

          hit.addEventListener('touchend', stopTouchTracking, { passive: true });
          hit.addEventListener('touchcancel', stopTouchTracking, { passive: true });
        }
      }

      function buildNiceScale(min, max, targetTicks) {
        const safeTarget = clamp(targetTicks || 4, 3, 7);
        if (!Number.isFinite(min) || !Number.isFinite(max)) {
          return { min: 0, max: 1, step: 0.25, ticks: [0, 0.5, 1] };
        }

        if (min === max) {
          const baseSpread = Math.max(Math.abs(max) * 0.08, 0.01);
          min -= baseSpread;
          max += baseSpread;
        }

        const rawRange = Math.max(max - min, 0.0000001);
        let step = niceStep(rawRange / Math.max(safeTarget - 1, 1));
        let niceMin = Math.floor(min / step) * step;
        let niceMax = Math.ceil(max / step) * step;
        let ticks = generateTicks(niceMin, niceMax, step);

        while (ticks.length > safeTarget + 1) {
          step = nextNiceStep(step);
          niceMin = Math.floor(min / step) * step;
          niceMax = Math.ceil(max / step) * step;
          ticks = generateTicks(niceMin, niceMax, step);
        }

        if (ticks.length < 3) {
          const fallbackStep = niceStep(rawRange / 2 || 0.01);
          niceMin = min - fallbackStep;
          niceMax = max + fallbackStep;
          step = fallbackStep;
          ticks = generateTicks(niceMin, niceMax, step);
        }

        return { min: niceMin, max: niceMax, step, ticks };
      }

      function niceStep(rawStep) {
        const safeStep = Math.max(rawStep, 0.0000001);
        const exponent = Math.floor(Math.log10(safeStep));
        const magnitude = 10 ** exponent;
        const fraction = safeStep / magnitude;
        let niceFraction;
        if (fraction <= 1) niceFraction = 1;
        else if (fraction <= 2) niceFraction = 2;
        else if (fraction <= 2.5) niceFraction = 2.5;
        else if (fraction <= 5) niceFraction = 5;
        else niceFraction = 10;
        return niceFraction * magnitude;
      }

      function nextNiceStep(step) {
        return niceStep(step * 1.6);
      }

      function generateTicks(min, max, step) {
        const ticks = [];
        const limit = 20;
        const epsilon = step / 1000;
        for (let value = min, count = 0; value <= max + epsilon && count < limit; value += step, count += 1) {
          ticks.push(Number(value.toFixed(10)));
        }
        return ticks;
      }

      function buildEvenXAxisLabels(points, plotLeft, plotWidth) {
        if (!points.length) return [];
        if (points.length === 1) {
          return [{ x: points[0].x, label: formatAxisDateLabel(points[0].date), anchor: 'middle' }];
        }

        const minGap = plotWidth < 260 ? 56 : plotWidth < 360 ? 62 : plotWidth < 520 ? 70 : 82;
        const labelCount = clamp(Math.floor(plotWidth / minGap) + 1, 3, 8);

        return Array.from({ length: labelCount }, (_, index) => {
          const ratio = labelCount === 1 ? 0 : index / (labelCount - 1);
          const pointIndex = Math.round(ratio * (points.length - 1));
          return {
            x: plotLeft + ratio * plotWidth,
            label: formatAxisDateLabel(points[pointIndex].date),
            anchor: index === 0 ? 'start' : index === labelCount - 1 ? 'end' : 'middle'
          };
        });
      }

      function formatAxisTickValue(value, step) {
        if (!Number.isFinite(value)) return '—';
        return new Intl.NumberFormat('uk-UA', {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        }).format(value);
      }

      function updateDetailChartLabels() {
        const series = state.detailSeries;
        if (!series.length) return;
        const point = series[clamp(state.chartActiveIndex ?? series.length - 1, 0, series.length - 1)];
        const valueLabel = document.getElementById('chartValueLabel');
        const dateLabel = document.getElementById('chartDateLabel');
        if (valueLabel) valueLabel.textContent = `${formatRate(point.value, getCurrentViewRateDigits())} ${state.baseCurrency}`;
        if (dateLabel) dateLabel.textContent = point.displayDate;
      }

      function getActiveChartValue(series) {
        const point = series[clamp(state.chartActiveIndex ?? series.length - 1, 0, series.length - 1)];
        return point?.value ?? 0;
      }

      function getActiveChartDateLabel(series) {
        const point = series[clamp(state.chartActiveIndex ?? series.length - 1, 0, series.length - 1)];
        return point?.displayDate ?? '';
      }

      function deriveSeriesMetrics(series) {
        const values = series.map((point) => point.value);
        const first = values[0];
        const last = values[values.length - 1];
        const changeAbsolute = last - first;
        return {
          min: Math.min(...values),
          max: Math.max(...values),
          changeAbsolute,
          changePercent: first ? (changeAbsolute / first) * 100 : 0
        };
      }

      function getDisplayCards() {
        if (!state.currentRates) return [];
        const codes = state.viewMode === 'metals' ? METAL_CODES : DISPLAY_CODES;
        return codes
          .map((code) => state.currentRates[code])
          .filter(Boolean)
          .filter((row) => state.viewMode === 'metals' ? true : row.cc !== state.baseCurrency);
      }

      function getAllCurrencyRows() {
        if (!state.currentRates) return [];
        return DISPLAY_CODES
          .map((code) => state.currentRates[code])
          .filter(Boolean)
          .filter((row) => !EXCLUDED_CODES.has(row.cc));
      }

      function getAvailableCodes() {
        if (!state.currentRates) return ['UAH'];
        return DISPLAY_CODES.filter((code) => state.currentRates[code] && !EXCLUDED_CODES.has(code));
      }

      function getCurrencyName(code) {
        if (code === 'UAH') return 'Українська гривня';
        if (METAL_LABELS[code]) return METAL_LABELS[code];
        return state.currentRates?.[code]?.txt || code;
      }

      function getCrossRate(targetCode, baseCode, map) {
        const target = getUAHRate(targetCode, map);
        const base = getUAHRate(baseCode, map);
        return target / base;
      }

      function getDailyChange(targetCode, baseCode) {
        if (!state.currentRates || !state.previousRates) return null;
        const current = getCrossRate(targetCode, baseCode, state.currentRates);
        const previous = getCrossRate(targetCode, baseCode, state.previousRates);
        if (!Number.isFinite(previous) || previous === 0) return null;
        const absolute = current - previous;
        return {
          absolute,
          percent: (absolute / previous) * 100
        };
      }

      function convertAmount(amount, from, to) {
        if (!state.currentRates || !Number.isFinite(amount)) return null;
        const inUAH = amount * getUAHRate(from, state.currentRates);
        return inUAH / getUAHRate(to, state.currentRates);
      }

      function getUAHRate(code, map) {
        if (code === 'UAH') return 1;
        const row = map?.[code];
        return Number(row?.ratePerUnit ?? row?.rate ?? NaN);
      }

      function normalizeRatesArray(rows) {
        return rows.reduce((acc, row) => {
          if (!row?.cc) return acc;
          const units = Number(row.units) || 1;
          const rawRate = Number(row.rate);
          const ratePerUnit = Number(row.rate_per_unit ?? (rawRate / units));
          if (!Number.isFinite(ratePerUnit)) return acc;
          acc[row.cc] = {
            ...row,
            cc: row.cc,
            txt: row.txt || METAL_LABELS[row.cc] || row.enname || row.cc,
            rate: rawRate,
            units,
            ratePerUnit,
            exchangedate: row.exchangedate || null
          };
          return acc;
        }, {});
      }

      function createUAHRow(displayDate) {
        return {
          cc: 'UAH',
          txt: 'Українська гривня',
          enname: 'Ukrainian Hryvnia',
          rate: 1,
          ratePerUnit: 1,
          units: 1,
          exchangedate: displayDate
        };
      }

      function pickOfficialDate(map) {
        const any = Object.values(map).find((row) => row.exchangedate);
        return any?.exchangedate || null;
      }

      function renderSkeletonCards() {
        const cards = [];
        for (let i = 0; i < 7; i += 1) {
          cards.push(`
            <article class="skeleton-card" aria-hidden="true">
              <div class="skeleton-row">
                <div class="skeleton-line" style="width:96px;"></div>
                <div class="skeleton-line" style="width:34px; height:34px; border-radius:12px;"></div>
              </div>
              <div class="skeleton-row" style="align-items:flex-end;">
                <div style="display:grid; gap:10px; width:58%;">
                  <div class="skeleton-line" style="height:34px; width:100%; border-radius:16px;"></div>
                  <div class="skeleton-line" style="width:82%;"></div>
                </div>
                <div style="display:grid; gap:10px; width:112px; justify-items:end;">
                  <div class="skeleton-chip" style="width:100%;"></div>
                  <div class="skeleton-line" style="width:72px;"></div>
                </div>
              </div>
            </article>
          `);
        }
        return cards.join('');
      }

      function installSheetDrag(sheetEl, grabEl, onClose, options = {}) {
        const direction = options.direction === 'up' ? 'up' : 'down';
        const headerEl = sheetEl.querySelector('.sheet-header');
        const scrollEl = sheetEl.querySelector('.sheet-scroll');
        const dragStartEl = sheetEl;
        const interactiveSelector = 'button, input, select, textarea, a, [role="button"], label, svg, canvas';
        let startY = 0;
        let currentY = 0;
        let dragging = false;
        let pointerId = null;
        let moved = false;
        let suppressHeaderClick = false;
        let activeTouchId = null;

        const canStartDragFromTarget = (target) => {
          if (!target || target.closest(interactiveSelector)) return false;
          if (scrollEl && target.closest('.sheet-scroll') && scrollEl.scrollTop > 0) return false;
          return true;
        };

        const beginDrag = (clientY) => {
          dragging = true;
          moved = false;
          startY = clientY;
          currentY = 0;
          sheetEl.classList.add('is-dragging');
        };

        const updateDrag = (clientY) => {
          if (!dragging) return;
          const deltaY = clientY - startY;
          currentY = direction === 'up' ? Math.min(0, deltaY) : Math.max(0, deltaY);
          moved = moved || Math.abs(deltaY) > 6;
          sheetEl.style.transform = `translateY(${currentY}px)`;
        };

        const endDrag = () => {
          if (!dragging) return;
          dragging = false;
          sheetEl.classList.remove('is-dragging');
          const shouldClose = direction === 'up' ? currentY < -96 : currentY > 96;
          suppressHeaderClick = moved;
          sheetEl.style.transform = '';
          if (shouldClose) onClose();
          currentY = 0;
          pointerId = null;
          activeTouchId = null;
          moved = false;
        };

        const onPointerDown = (event) => {
          if (event.pointerType === 'mouse' && event.button !== 0) return;
          if (!canStartDragFromTarget(event.target)) return;
          pointerId = event.pointerId;
          beginDrag(event.clientY);
          if (dragStartEl.setPointerCapture && pointerId != null) {
            try { dragStartEl.setPointerCapture(pointerId); } catch {}
          }
        };

        const onPointerMove = (event) => {
          if (!dragging) return;
          if (pointerId != null && event.pointerId !== pointerId) return;
          updateDrag(event.clientY);
        };

        const onPointerUp = (event) => {
          if (!dragging) return;
          if (pointerId != null && event && event.pointerId !== undefined && event.pointerId !== pointerId) return;
          endDrag();
        };

        const onTouchStart = (event) => {
          if (!canStartDragFromTarget(event.target)) return;
          const touch = event.changedTouches && event.changedTouches[0];
          if (!touch) return;
          activeTouchId = touch.identifier;
          beginDrag(touch.clientY);
          event.preventDefault();
        };

        const onTouchMove = (event) => {
          if (!dragging || activeTouchId == null) return;
          const touch = Array.from(event.changedTouches || []).find((item) => item.identifier === activeTouchId)
            || Array.from(event.touches || []).find((item) => item.identifier === activeTouchId);
          if (!touch) return;
          updateDrag(touch.clientY);
          event.preventDefault();
        };

        const onTouchEnd = (event) => {
          if (!dragging || activeTouchId == null) return;
          const touch = Array.from(event.changedTouches || []).find((item) => item.identifier === activeTouchId);
          if (!touch) return;
          endDrag();
        };

        const onHeaderClick = (event) => {
          if (event.target.closest('button')) return;
          if (dragging || suppressHeaderClick) {
            suppressHeaderClick = false;
            return;
          }
          onClose();
        };

        dragStartEl.addEventListener('pointerdown', onPointerDown);
        dragStartEl.addEventListener('touchstart', onTouchStart, { passive: false });
        dragStartEl.addEventListener('touchmove', onTouchMove, { passive: false });
        dragStartEl.addEventListener('touchend', onTouchEnd, { passive: false });
        dragStartEl.addEventListener('touchcancel', onTouchEnd, { passive: false });
        if (headerEl) headerEl.addEventListener('click', onHeaderClick);
        window.addEventListener('pointermove', onPointerMove, { passive: true });
        window.addEventListener('pointerup', onPointerUp, { passive: true });
        window.addEventListener('pointercancel', onPointerUp, { passive: true });
      }

      function focusAmountInputSoon() {
        setTimeout(() => {
          const input = document.getElementById('converterAmountInput');
          if (!input || state.activeOverlay !== 'converter' || state.converter.pickerTarget) return;
          input.focus({ preventScroll: true });
          try { input.setSelectionRange(input.value.length, input.value.length); } catch {}
        }, 260);
      }

      function focusConverterSearchSoon() {
        setTimeout(() => {
          const input = document.getElementById('converterSearch');
          if (!input || state.activeOverlay !== 'converter' || !state.converter.pickerTarget) return;
          input.focus({ preventScroll: true });
        }, 60);
      }

      function parseInputNumber(value) {
        const normalized = String(value || '').replace(/\s/g, '').replace(',', '.');
        if (!normalized) return NaN;
        return Number(normalized);
      }

      function getCurrentViewRateDigits() {
        return state.viewMode === 'metals' ? 2 : 4;
      }

      function formatRate(value, digits = 4) {
        if (!Number.isFinite(value)) return '—';
        return new Intl.NumberFormat('uk-UA', {
          minimumFractionDigits: digits,
          maximumFractionDigits: digits
        }).format(value);
      }

      function formatAmount(value) {
        if (!Number.isFinite(value)) return '—';
        const abs = Math.abs(value);
        const maxDigits = abs >= 100 ? 2 : abs >= 10 ? 3 : abs >= 1 ? 4 : 6;
        return new Intl.NumberFormat('uk-UA', {
          minimumFractionDigits: 0,
          maximumFractionDigits: maxDigits
        }).format(value);
      }

      function smallNumber(value) {
        if (!Number.isFinite(value)) return '—';
        return new Intl.NumberFormat('uk-UA', {
          minimumFractionDigits: 0,
          maximumFractionDigits: 2
        }).format(value);
      }

      function formatSignedPercent(value) {
        if (!Number.isFinite(value)) return 'Н/Д';
        const prefix = value > 0 ? '+' : value < 0 ? '−' : '';
        return `${prefix}${Math.abs(value).toLocaleString('uk-UA', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}%`;
      }

      function formatSignedNumber(value) {
        if (!Number.isFinite(value)) return 'Н/Д';
        const prefix = value > 0 ? '+' : value < 0 ? '−' : '';
        return `${prefix}${formatRate(Math.abs(value))}`;
      }

      function formatTime(date) {
        return new Intl.DateTimeFormat('uk-UA', {
          hour: '2-digit',
          minute: '2-digit'
        }).format(date);
      }

      function formatAxisDateLabel(isoDate) {
        const date = new Date(`${isoDate}T00:00:00`);
        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        return `${day}.${month}`;
      }

      function formatDisplayDate(date) {
        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const year = date.getFullYear();
        return `${day}.${month}.${year}`;
      }

      function formatApiDate(date) {
        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const year = date.getFullYear();
        return `${year}${month}${day}`;
      }

      function parseDisplayDateParts(value) {
        const match = /^(\d{2})\.(\d{2})\.(\d{4})$/.exec(value || '');
        if (!match) return null;
        const [, day, month, year] = match;
        return {
          day: Number(day),
          month: Number(month),
          year: Number(year)
        };
      }

      function parseDisplayDate(value) {
        const parts = parseDisplayDateParts(value);
        if (!parts) return null;
        return new Date(parts.year, parts.month - 1, parts.day);
      }

      function toIsoDate(displayDate) {
        const parts = parseDisplayDateParts(displayDate);
        if (!parts) return null;
        return `${String(parts.year).padStart(4, '0')}-${String(parts.month).padStart(2, '0')}-${String(parts.day).padStart(2, '0')}`;
      }

      function readLS(key, fallback) {
        try {
          const value = localStorage.getItem(key);
          return value === null ? fallback : value;
        } catch {
          return fallback;
        }
      }

      function normalizeConverterAmount(value) {
        const normalized = String(value ?? '').trim();
        if (normalized === '100') return '';
        return normalized;
      }

      function writeLS(key, value) {
        try {
          localStorage.setItem(key, String(value));
        } catch {}
      }

      function persistConverterPrefs() {
        writeLS(STORAGE_KEYS.converterFrom, state.converter.from);
        writeLS(STORAGE_KEYS.converterTo, state.converter.to);
        writeLS(STORAGE_KEYS.converterAmount, state.converter.amount);
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js', { scope: './' }).catch((error) => {
          console.error('Service worker registration failed:', error);
        });
      });
    }
  </script>
