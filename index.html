<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#08111f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FX Converter" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <title>Курси та метали НБУ</title>
  <style>
    :root {
      --bg: #07111d;
      --shell: #0b1524;
      --surface: rgba(16, 26, 43, 0.9);
      --surface-2: #132037;
      --surface-3: #0d1728;
      --text: #edf4ff;
      --muted: #9aabc1;
      --muted-2: #7f93ad;
      --line: rgba(154, 171, 193, 0.16);
      --line-strong: rgba(154, 171, 193, 0.24);
      --accent: #2fd47a;
      --accent-soft: rgba(47, 212, 122, 0.12);
      --accent-strong: #62f0a0;
      --danger: #ff8b8b;
      --danger-soft: rgba(255, 139, 139, 0.12);
      --ink-shadow: 0 28px 80px rgba(0, 0, 0, 0.5);
      --sheet-shadow: 0 -20px 48px rgba(0, 0, 0, 0.48);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --tap: 48px;
      --header-safe: max(16px, env(safe-area-inset-top));
      --bottom-safe: max(16px, env(safe-area-inset-bottom));
      --card-gap: 14px;
      --transition: 220ms cubic-bezier(.2,.8,.24,1);
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(47, 212, 122, 0.14), transparent 24%),
        radial-gradient(circle at 100% 0%, rgba(76, 144, 255, 0.12), transparent 28%),
        linear-gradient(180deg, #050c16 0%, #08111d 100%);
      color: var(--text);
      font-family: var(--font);
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      background: none;
      color: inherit;
      cursor: pointer;
    }

    .app-shell {
      position: relative;
      width: min(100vw, 520px);
      height: 100dvh;
      background:
        linear-gradient(180deg, rgba(11, 21, 36, 0.98), rgba(9, 18, 31, 0.98));
      backdrop-filter: saturate(1.15) blur(16px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--ink-shadow);
      border: 1px solid rgba(154, 171, 193, 0.08);
    }

    .app-header {
      flex: 0 0 auto;
      padding: calc(var(--header-safe) + 6px) 18px 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      background: linear-gradient(180deg, rgba(14, 23, 39, 0.96), rgba(14, 23, 39, 0.88));
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(154, 171, 193, 0.12);
      z-index: 3;
    }

    .brand-block {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .brand-kicker {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .mode-toggle {
      width: fit-content;
      max-width: 100%;
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px;
      padding: 4px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(154, 171, 193, 0.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .mode-btn {
      min-width: 88px;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 14px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: -0.01em;
      background: transparent;
      border: 1px solid transparent;
    }

    .mode-btn.active {
      color: var(--text);
      background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.05));
      border-color: rgba(154, 171, 193, 0.16);
      box-shadow: 0 8px 18px rgba(0,0,0,0.18);
    }

    .header-meta {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      min-height: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }


    .header-actions > .action-btn {
      white-space: nowrap;
    }

    .install-btn {
      min-width: 0;
      padding-inline: 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.035);
      border-color: rgba(154, 171, 193, 0.18);
      box-shadow: none;
    }

    .install-btn:hover,
    .install-btn:focus-visible {
      color: var(--text);
      border-color: rgba(154, 171, 193, 0.28);
      background: rgba(255, 255, 255, 0.06);
    }

    .install-diagnostics {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      text-align: right;
      max-width: 190px;
    }

    .icon-btn,
    .action-btn,
    .ghost-btn,
    .chip,
    .picker-row,
    .list-row,
    .period-chip,
    .swap-btn,
    .sheet-close,
    .retry-btn,
    .mini-btn {
      transition: transform 140ms ease, background-color 140ms ease, border-color 140ms ease, opacity 140ms ease;
    }

    .icon-btn:active,
    .action-btn:active,
    .ghost-btn:active,
    .chip:active,
    .picker-row:active,
    .list-row:active,
    .period-chip:active,
    .swap-btn:active,
    .sheet-close:active,
    .retry-btn:active,
    .mini-btn:active,
    .currency-card:active {
      transform: scale(0.985);
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      color: var(--text);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    .action-btn {
      min-height: 42px;
      padding: 0 14px;
      border-radius: 15px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.03));
      border: 1px solid rgba(154, 171, 193, 0.14);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .base-strip {
      flex: 0 0 auto;
      display: grid;
      gap: 10px;
      padding: 14px 18px 12px;
      background: linear-gradient(180deg, rgba(11, 21, 36, 0.9), rgba(11, 21, 36, 0.7));
      border-bottom: 1px solid rgba(154, 171, 193, 0.08);
      z-index: 2;
    }

    .base-context {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .base-context strong {
      color: var(--text);
      font-weight: 700;
    }

    .chips-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .chips-row::-webkit-scrollbar {
      display: none;
    }

    .chip {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-weight: 600;
      white-space: nowrap;
    }

    .chip.active {
      border-color: rgba(15, 143, 85, 0.34);
      background: var(--accent-soft);
      color: var(--accent-strong);
      box-shadow: inset 0 0 0 1px rgba(15, 143, 85, 0.08);
    }

    .content-area {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      overscroll-behavior-y: contain;
      padding: 16px 18px calc(var(--bottom-safe) + 18px);
      scrollbar-width: none;
    }

    .content-area::-webkit-scrollbar {
      display: none;
    }

    .cards-list {
      display: grid;
      gap: var(--card-gap);
      min-height: 100%;
      align-content: start;
    }

    .currency-card {
      width: 100%;
      text-align: left;
      padding: 16px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(148, 163, 184, 0.18);
      background:
        linear-gradient(180deg, rgba(19, 32, 55, 0.96), rgba(15, 25, 43, 0.96));
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.22);
      display: grid;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }

    .currency-card::after {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: linear-gradient(180deg, rgba(47, 212, 122, 0.52), rgba(47, 212, 122, 0.1));
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .currency-card::before,
    .detail-summary::before,
    .chart-card::before,
    .input-card::before,
    .result-card::before,
    .section-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(47, 212, 122, 0.08), transparent 34%);
      pointer-events: none;
    }

    .currency-card:hover::after,
    .currency-card:focus-visible::after,
    .currency-card:active::after {
      opacity: 1;
    }

    .card-top,
    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-width: 0;
    }

    .card-code-group {
      min-width: 0;
      display: grid;
      gap: 5px;
    }

    .card-code {
      font-size: 20px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .card-name {
      font-size: 13px;
      line-height: 1.25;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-chevron {
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.04);
      color: var(--muted);
      font-size: 18px;
    }

    .card-rate-block {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .card-rate {
      font-size: clamp(28px, 7vw, 34px);
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: -0.03em;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-variant-numeric: tabular-nums;
    }

    .card-rate-caption {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.25;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-variant-numeric: tabular-nums;
    }

    .delta-stack {
      display: grid;
      justify-items: end;
      gap: 8px;
      flex: 0 0 auto;
      text-align: right;
    }

    .delta-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      white-space: nowrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-variant-numeric: tabular-nums;
    }

    .delta-pill.up {
      background: var(--accent-soft);
      color: var(--accent-strong);
      border-color: rgba(15, 143, 85, 0.14);
    }

    .delta-pill.down {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: rgba(180, 35, 24, 0.12);
    }

    .delta-caption {
      font-size: 12px;
      color: var(--muted);
    }

    .state-card,
    .empty-card,
    .inline-state {
      border-radius: var(--radius-lg);
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: linear-gradient(180deg, rgba(19, 32, 55, 0.94), rgba(14, 24, 42, 0.94));
      padding: 18px;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.22);
    }

    .state-card h2,
    .empty-card h2,
    .inline-state h3 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .state-card p,
    .empty-card p,
    .inline-state p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    .state-actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .retry-btn,
    .mini-btn,
    .ghost-btn {
      min-height: 42px;
      padding: 0 14px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line-strong);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-weight: 700;
    }

    .ghost-btn {
      background: var(--surface-3);
    }

    .skeleton-card {
      padding: 16px;
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(148, 163, 184, 0.14);
      display: grid;
      gap: 14px;
      overflow: hidden;
      position: relative;
    }

    .skeleton-card::after,
    .skeleton-line::after,
    .skeleton-chip::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      animation: shimmer 1.45s infinite;
    }

    .skeleton-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
    }

    .skeleton-line,
    .skeleton-chip {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(148, 163, 184, 0.16);
    }

    .skeleton-line { height: 14px; }
    .skeleton-chip { height: 38px; border-radius: 999px; }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .scrim {
      position: absolute;
      inset: 0;
      background: rgba(2, 7, 15, 0.58);
      backdrop-filter: blur(6px);
    }

    .sheet {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(12, 20, 34, 0.99), rgba(9, 16, 29, 0.99));
      border-radius: 26px 26px 0 0;
      box-shadow: var(--sheet-shadow);
      transform: translateY(calc(100% + 18px));
      transition: transform 260ms cubic-bezier(.2,.84,.25,1), opacity var(--transition);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      will-change: transform;
      max-height: 92dvh;
    }

    .overlay.open .sheet {
      transform: translateY(0);
    }

    .sheet.is-dragging {
      transition: none;
    }

    .sheet-medium {
      height: min(88dvh, 760px);
    }

    .sheet-compact {
      height: min(72dvh, 620px);
    }

    #converterSheet {
      top: 0;
      bottom: auto;
      border-radius: 0 0 26px 26px;
      transform: translateY(calc(-100% - 18px));
      height: min(62dvh, 540px);
      max-height: calc(100dvh - var(--top-safe) - 12px);
    }

    .overlay.open #converterSheet {
      transform: translateY(0);
    }

    .sheet-header {
      flex: 0 0 auto;
      display: grid;
      gap: 10px;
      padding: 10px 18px 12px;
      border-bottom: 1px solid rgba(154, 171, 193, 0.08);
      background: linear-gradient(180deg, rgba(14, 23, 39, 0.98), rgba(14, 23, 39, 0.9));
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #converterSheet .sheet-header {
      padding-top: calc(var(--top-safe) + 10px);
    }

    #detailSheet .sheet-header {
      padding-top: 8px;
      padding-bottom: 10px;
    }

    #detailSheet .sheet-scroll {
      padding-top: 12px;
      padding-bottom: calc(var(--bottom-safe) + 14px);
    }

    .sheet-grab {
      width: 44px;
      height: 5px;
      border-radius: 999px;
      background: rgba(154, 171, 193, 0.26);
      justify-self: center;
      cursor: grab;
      touch-action: none;
    }

    .sheet-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
    }

    .sheet-title-group {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .sheet-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: -0.04em;
    }

    .sheet-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .sheet-close {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.05);
      color: var(--muted);
      font-size: 20px;
      flex: 0 0 auto;
    }

    .sheet-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 16px 18px calc(var(--bottom-safe) + 18px);
      overscroll-behavior: contain;
      scrollbar-width: none;
    }

    .sheet-scroll::-webkit-scrollbar { display: none; }

    .list-section {
      display: grid;
      gap: 10px;
    }

    .search-field-wrap {
      position: relative;
    }

    .search-field {
      width: 100%;
      min-height: 46px;
      border-radius: 16px;
      border: 1px solid var(--line-strong);
      background: rgba(255, 255, 255, 0.05);
      padding: 0 14px;
      outline: none;
      color: var(--text);
    }

    .search-field:focus {
      border-color: rgba(15, 143, 85, 0.34);
      box-shadow: 0 0 0 4px rgba(15, 143, 85, 0.08);
      background: rgba(19, 32, 55, 0.96);
    }

    .list-row,
    .picker-row {
      min-height: 56px;
      width: 100%;
      border-radius: 18px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
      background: linear-gradient(180deg, rgba(19, 32, 55, 0.94), rgba(15, 25, 43, 0.94));
      border: 1px solid rgba(154, 171, 193, 0.12);
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.18);
    }

    .list-row.active,
    .picker-row.active {
      border-color: rgba(15, 143, 85, 0.3);
      background: var(--accent-soft);
    }

    .row-main {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .row-code {
      font-weight: 800;
      letter-spacing: -0.03em;
      font-size: 15px;
    }

    .row-label {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-tag {
      flex: 0 0 auto;
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
    }

    .detail-layout {
      display: grid;
      gap: 12px;
    }

    .detail-summary {
      position: relative;
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(19, 32, 55, 0.96), rgba(14, 24, 42, 0.96));
      border: 1px solid rgba(154, 171, 193, 0.12);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.22);
    }

    .detail-summary-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .detail-code-block {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .detail-code {
      font-size: 24px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .detail-name {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
    }

    .detail-rate {
      display: grid;
      gap: 6px;
    }

    .detail-rate-value {
      font-size: clamp(30px, 8vw, 38px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.06em;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-variant-numeric: tabular-nums;
    }

    .detail-rate-caption {
      color: var(--muted);
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-variant-numeric: tabular-nums;
    }

    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .period-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }

    .period-row::-webkit-scrollbar { display: none; }

    .period-chip {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      font-weight: 700;
      color: var(--text);
      flex: 0 0 auto;
    }

    .period-chip.active {
      background: var(--accent-soft);
      color: var(--accent-strong);
      border-color: rgba(15, 143, 85, 0.26);
    }

    .chart-card {
      position: relative;
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: linear-gradient(180deg, rgba(19, 32, 55, 0.96), rgba(14, 24, 42, 0.96));
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.22);
    }

    .chart-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      min-width: 0;
      flex-wrap: wrap;
    }

    .chart-meta-value {
      min-width: 0;
      display: grid;
      gap: 5px;
    }

    .chart-value-label {
      font-size: 20px;
      line-height: 1;
      letter-spacing: -0.04em;
      font-weight: 800;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-variant-numeric: tabular-nums;
    }

    .chart-secondary {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      font-family: var(--font);
      font-variant-numeric: tabular-nums;
    }

    .chart-area {
      position: relative;
      width: 100%;
      min-height: 188px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(47, 212, 122, 0.10), rgba(6, 12, 22, 0.12));
      overflow: hidden;
    }

    .chart-empty {
      min-height: 188px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .chart-svg {
      width: 100%;
      height: 188px;
      display: block;
      overflow: visible;
    }

    .chart-grid {
      stroke: rgba(154, 171, 193, 0.14);
      stroke-width: 1;
    }

    .chart-path {
      fill: none;
      stroke: var(--accent);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chart-area-fill {
      fill: url(#chartFill);
    }

    .chart-hit {
      fill: transparent;
      cursor: crosshair;
    }

    .chart-axis-label {
      fill: var(--muted);
      font-size: 10.5px;
      font-family: var(--font);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.005em;
    }

    .chart-focus-line {
      stroke: rgba(15, 143, 85, 0.42);
      stroke-width: 1.5;
      stroke-dasharray: 4 5;
    }

    .chart-focus-dot {
      fill: #0b1524;
      stroke: var(--accent);
      stroke-width: 3;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .metric-card {
      min-width: 0;
      padding: 12px 10px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(148, 163, 184, 0.16);
      display: grid;
      gap: 3px;
      align-content: start;
      justify-items: center;
      text-align: center;
    }

    .metric-label {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.15;
      text-align: center;
    }

    .metric-value {
      font-size: 14px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      font-weight: 800;
      word-break: break-word;
      text-align: center;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-variant-numeric: tabular-nums;
    }

    .metric-value.up { color: var(--accent-strong); }
    .metric-value.down { color: var(--danger); }

    .converter-layout {
      display: grid;
      gap: 16px;
    }

    .converter-main {
      display: grid;
      gap: 14px;
    }

    .input-card,
    .result-card,
    .section-card {
      position: relative;
      display: grid;
      gap: 12px;
      padding: 16px;
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(19, 32, 55, 0.96), rgba(14, 24, 42, 0.96));
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.22);
    }

    .input-label,
    .section-label {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .amount-input {
      width: 100%;
      border: 0;
      padding: 0;
      outline: none;
      background: transparent;
      font-size: clamp(34px, 9vw, 42px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: var(--text);
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .amount-input::-webkit-outer-spin-button,
    .amount-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .converter-rows {
      display: grid;
      gap: 12px;
    }

    .converter-pair-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: end;
      gap: 10px;
    }

    .converter-row {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .picker-row {
      min-height: 58px;
      padding-block: 10px;
    }

    .picker-row.compact {
      width: 100%;
      min-width: 0;
      padding: 10px 14px;
      gap: 10px;
    }

    .picker-row.compact .row-main {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .picker-row.compact .row-code {
      font-size: 18px;
      letter-spacing: 0.01em;
    }

    .picker-row.compact .row-label {
      display: none;
    }

    .picker-row-arrow {
      color: var(--muted-2);
      font-size: 18px;
      flex: 0 0 auto;
    }

    .swap-wrap {
      display: flex;
      justify-content: center;
      align-self: end;
      padding-bottom: 1px;
    }

    .swap-btn {
      width: 50px;
      height: 58px;
      border-radius: 18px;
      background: rgba(19, 32, 55, 0.94);
      border: 1px solid rgba(148, 163, 184, 0.16);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--text);
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.16);
    }

    .result-primary {
      font-size: clamp(32px, 8vw, 40px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.05em;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-variant-numeric: tabular-nums;
    }

    .result-secondary {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.45;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-variant-numeric: tabular-nums;
    }

    .picker-view {
      display: grid;
      gap: 14px;
    }

    .picker-topline {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .picker-back {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.05);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      font-size: 20px;
    }

    .picker-title-block {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .picker-title {
      margin: 0;
      font-size: 19px;
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .picker-title-note {
      margin: 0;
      font-size: 13px;
      line-height: 1.35;
      color: var(--muted);
    }

    .a11y-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
      white-space: nowrap;
    }

    :focus-visible {
      outline: 3px solid rgba(47, 212, 122, 0.34);
      outline-offset: 2px;
    }

    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }

    @media (max-width: 480px) {
      .app-header { gap: 12px; }
      .header-actions { gap: 8px; }
      .action-btn { padding-inline: 12px; font-size: 13px; }
      .mode-btn { min-width: 78px; padding-inline: 12px; }
    }

    @media (max-width: 390px) {
      .app-header { padding-inline: 16px; }
      .base-strip { padding-inline: 16px; }
      .content-area { padding-inline: 16px; }
      .sheet-header { padding-inline: 16px; }
      .sheet-scroll { padding-inline: 16px; }
      .detail-summary,
      .chart-card { padding: 12px; }
      .chart-area,
      .chart-empty,
      .chart-svg { min-height: 176px; height: 176px; }
      .metric-card { padding: 10px 8px; }
      .metric-label { font-size: 10px; }
      .metric-value { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="app-shell" id="appShell">
    <header class="app-header">
      <div class="brand-block">
        <div class="brand-kicker">Офіційний курс НБУ</div>
        <h1 class="a11y-hidden">Курси та метали НБУ</h1>
        <div class="mode-toggle" id="viewModeToggle" role="tablist" aria-label="Режим перегляду">
          <button class="mode-btn active" type="button" data-view-mode="currencies" role="tab" aria-selected="true">Валюти</button>
          <button class="mode-btn" type="button" data-view-mode="metals" role="tab" aria-selected="false">Метали</button>
        </div>
        <p class="header-meta" id="headerMeta">Завантаження даних…</p>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="refreshBtn" type="button" aria-label="Оновити курси">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M20 5V10H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 19V14H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6.9 9C7.4 7.58 8.4 6.39 9.72 5.65C11.04 4.91 12.58 4.68 14.05 5.01C15.52 5.35 16.82 6.22 17.72 7.45L20 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M17.1 15C16.6 16.42 15.6 17.61 14.28 18.35C12.96 19.09 11.42 19.32 9.95 18.99C8.48 18.65 7.18 17.78 6.28 16.55L4 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="action-btn install-btn" id="installAppBtn" type="button" hidden>Встановити</button>
        <button class="action-btn" id="openConverterBtn" type="button">Конвертер</button>
        <p class="install-diagnostics" id="installDiagnostics" role="status" aria-live="polite"></p>
      </div>
    </header>

    <section class="base-strip" aria-label="Вибір базової валюти">
      <div class="base-context" id="baseContext">Курси відносно <strong>UAH</strong></div>
      <div class="chips-row" id="baseChips"></div>
    </section>

    <main class="content-area" id="mainScrollArea">
      <section class="cards-list" id="cardsList"></section>
    </main>

    <div class="overlay" id="baseOverlay" aria-hidden="true">
      <div class="scrim" data-close-overlay="base"></div>
      <section class="sheet sheet-compact" id="baseSheet" role="dialog" aria-modal="true" aria-labelledby="baseSheetTitle">
        <div class="sheet-header">
          <div class="sheet-grab" id="baseGrab" aria-hidden="true"></div>
          <div class="sheet-topline">
            <div class="sheet-title-group">
              <h2 class="sheet-title" id="baseSheetTitle">Базова валюта</h2>
              <p class="sheet-subtitle">Вибір змінює весь список курсів.</p>
            </div>
            <button class="sheet-close" id="closeBaseSheet" type="button" aria-label="Закрити">×</button>
          </div>
        </div>
        <div class="sheet-scroll">
          <div class="list-section">
            <label class="a11y-hidden" for="baseSearch">Пошук валюти</label>
            <input class="search-field" id="baseSearch" type="search" placeholder="Пошук за кодом або назвою" autocomplete="off" />
            <div id="baseOptions"></div>
          </div>
        </div>
      </section>
    </div>

    <div class="overlay" id="detailOverlay" aria-hidden="true">
      <div class="scrim" data-close-overlay="detail"></div>
      <section class="sheet sheet-medium" id="detailSheet" role="dialog" aria-modal="true" aria-labelledby="detailSheetTitle">
        <div class="sheet-header">
          <div class="sheet-grab" id="detailGrab" aria-hidden="true"></div>
          <div class="sheet-topline">
            <div class="sheet-title-group">
              <h2 class="sheet-title" id="detailSheetTitle">Деталі валюти</h2>
              <p class="sheet-subtitle" id="detailSheetSubtitle">Графік та динаміка</p>
            </div>
            <button class="sheet-close" id="closeDetailSheet" type="button" aria-label="Закрити">×</button>
          </div>
        </div>
        <div class="sheet-scroll" id="detailBody"></div>
      </section>
    </div>

    <div class="overlay" id="converterOverlay" aria-hidden="true">
      <div class="scrim" data-close-overlay="converter"></div>
      <section class="sheet sheet-compact" id="converterSheet" role="dialog" aria-modal="true" aria-labelledby="converterSheetTitle">
        <div class="sheet-header">
          <div class="sheet-grab" id="converterGrab" aria-hidden="true"></div>
          <div class="sheet-topline">
            <div class="sheet-title-group">
              <h2 class="sheet-title" id="converterSheetTitle">Конвертер</h2>
              <p class="sheet-subtitle" id="converterSheetSubtitle">Розрахунок через поточні курси НБУ</p>
            </div>
            <button class="sheet-close" id="closeConverterSheet" type="button" aria-label="Закрити">×</button>
          </div>
        </div>
        <div class="sheet-scroll" id="converterBody"></div>
      </section>
    </div>
  </div>

  <script>
    (() => {
      const CURRENT_API = 'https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?json';
      const BY_DATE_API = (date) => `https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?date=${date}&json`;
      
      const DISPLAY_CODES = ['UAH', 'USD', 'EUR', 'PLN', 'CZK', 'GBP', 'CHF', 'CAD', 'RON', 'HUF', 'MDL', 'NOK', 'SEK', 'TRY', 'CNY', 'ILS'];
      const DISPLAY_ORDER = new Map(DISPLAY_CODES.map((code, index) => [code, index]));
      const QUICK_BASES = ['UAH', 'USD', 'EUR', 'PLN'];
      const METAL_CODES = ['XAU', 'XAG', 'XPT', 'XPD'];
      const METAL_LABELS = {
        XAU: 'Золото',
        XAG: 'Срібло',
        XPT: 'Платина',
        XPD: 'Паладій'
      };
      const EXCLUDED_CODES = new Set(METAL_CODES);
      const PERIODS = [
        { key: '7D', label: '7D', days: 7 },
        { key: '1M', label: '1M', days: 31 },
        { key: '3M', label: '3M', days: 92 },
        { key: '1Y', label: '1Y', days: 366 }
      ];
      const PERIOD_FETCH_PLAN = {
        '7D': { spanDays: 7, stepDays: 1 },
        '1M': { spanDays: 31, stepDays: 1 },
        '3M': { spanDays: 92, stepDays: 3 },
        '1Y': { spanDays: 366, stepDays: 7 }
      };
      const STORAGE_KEYS = {
        base: 'nbu.fx.base',
        converterFrom: 'nbu.fx.converter.from',
        converterTo: 'nbu.fx.converter.to',
        converterAmount: 'nbu.fx.converter.amount',
        viewMode: 'nbu.fx.view.mode'
      };

      const refs = {
        headerMeta: document.getElementById('headerMeta'),
        baseContext: document.getElementById('baseContext'),
        baseChips: document.getElementById('baseChips'),
        cardsList: document.getElementById('cardsList'),
        refreshBtn: document.getElementById('refreshBtn'),
        installAppBtn: document.getElementById('installAppBtn'),
        openConverterBtn: document.getElementById('openConverterBtn'),
        installDiagnostics: document.getElementById('installDiagnostics'),
        viewModeToggle: document.getElementById('viewModeToggle'),
        baseOverlay: document.getElementById('baseOverlay'),
        baseSheet: document.getElementById('baseSheet'),
        closeBaseSheet: document.getElementById('closeBaseSheet'),
        baseSearch: document.getElementById('baseSearch'),
        baseOptions: document.getElementById('baseOptions'),
        detailOverlay: document.getElementById('detailOverlay'),
        detailSheet: document.getElementById('detailSheet'),
        closeDetailSheet: document.getElementById('closeDetailSheet'),
        detailBody: document.getElementById('detailBody'),
        detailSheetTitle: document.getElementById('detailSheetTitle'),
        detailSheetSubtitle: document.getElementById('detailSheetSubtitle'),
        converterOverlay: document.getElementById('converterOverlay'),
        converterSheet: document.getElementById('converterSheet'),
        closeConverterSheet: document.getElementById('closeConverterSheet'),
        converterBody: document.getElementById('converterBody'),
        converterSheetSubtitle: document.getElementById('converterSheetSubtitle'),
        mainScrollArea: document.getElementById('mainScrollArea')
      };

      const state = {
        loading: true,
        refreshing: false,
        error: null,
        currentRates: null,
        previousRates: null,
        officialDate: null,
        fetchedAt: null,
        baseCurrency: readLS(STORAGE_KEYS.base, 'UAH'),
        viewMode: ['currencies', 'metals'].includes(readLS(STORAGE_KEYS.viewMode, 'currencies')) ? readLS(STORAGE_KEYS.viewMode, 'currencies') : 'currencies',
        activeOverlay: null,
        baseSearch: '',
        detailCurrency: null,
        detailPeriod: '1M',
        detailLoading: false,
        detailError: null,
        detailSeries: [],
        detailRequestToken: 0,
        chartActiveIndex: null,
        historyCache: new Map(),
        dayRatesCache: new Map(),
        converter: {
          amount: normalizeConverterAmount(readLS(STORAGE_KEYS.converterAmount, '')),
          from: readLS(STORAGE_KEYS.converterFrom, 'USD'),
          to: readLS(STORAGE_KEYS.converterTo, readLS(STORAGE_KEYS.base, 'UAH')),
          pickerTarget: null,
          search: ''
        },
        install: {
          deferredPrompt: null,
          available: false,
          installed: isRunningAsInstalledApp(),
          secureContext: window.isSecureContext === true
        }
      };

      init();

      function init() {
        bindStaticEvents();
        installSheetDrag(refs.baseSheet, document.getElementById('baseGrab'), closeBaseSheet);
        installSheetDrag(refs.detailSheet, document.getElementById('detailGrab'), closeDetailSheet, { direction: 'down' });
        installSheetDrag(refs.converterSheet, document.getElementById('converterGrab'), closeConverterSheet, { direction: 'up' });
        renderViewToggle();
        renderBaseChips();
        renderCards();
        renderBaseSheet();
        renderDetailBody();
        renderConverterBody();
        syncInstallButton();
        loadCurrentRates();
      }

      function bindStaticEvents() {
        refs.refreshBtn.addEventListener('click', () => loadCurrentRates(true));
        refs.installAppBtn.addEventListener('click', onInstallButtonClick);
        refs.openConverterBtn.addEventListener('click', () => openConverterSheet());
        refs.viewModeToggle.addEventListener('click', (event) => {
          const btn = event.target.closest('[data-view-mode]');
          if (!btn) return;
          setViewMode(btn.dataset.viewMode);
        });
        refs.closeBaseSheet.addEventListener('click', closeBaseSheet);
        refs.closeDetailSheet.addEventListener('click', closeDetailSheet);
        refs.closeConverterSheet.addEventListener('click', closeConverterSheet);

        document.querySelectorAll('[data-close-overlay]').forEach((el) => {
          el.addEventListener('click', (event) => {
            const type = event.currentTarget.dataset.closeOverlay;
            if (type === 'base') closeBaseSheet();
            if (type === 'detail') closeDetailSheet();
            if (type === 'converter') closeConverterSheet();
          });
        });

        refs.baseSearch.addEventListener('input', (event) => {
          state.baseSearch = event.target.value || '';
          renderBaseSheet();
        });

        refs.baseOptions.addEventListener('click', (event) => {
          const row = event.target.closest('[data-base-code]');
          if (!row) return;
          setBaseCurrency(row.dataset.baseCode);
          closeBaseSheet();
        });

        refs.baseChips.addEventListener('click', (event) => {
          const chip = event.target.closest('[data-chip-action]');
          if (!chip) return;
          if (chip.dataset.chipAction === 'more') {
            openBaseSheet();
            return;
          }
          const code = chip.dataset.code;
          if (code) setBaseCurrency(code);
        });

        refs.cardsList.addEventListener('click', (event) => {
          const card = event.target.closest('[data-card-code]');
          if (!card || !state.currentRates) return;
          openDetailSheet(card.dataset.cardCode);
        });

        refs.detailBody.addEventListener('click', (event) => {
          const periodBtn = event.target.closest('[data-period]');
          if (periodBtn) {
            const nextPeriod = periodBtn.dataset.period;
            if (nextPeriod && nextPeriod !== state.detailPeriod) {
              state.detailPeriod = nextPeriod;
              state.chartActiveIndex = null;
              if (state.detailCurrency) {
                loadDetailHistory(state.detailCurrency);
              } else {
                renderDetailBody();
              }
            }
            return;
          }

          const convertBtn = event.target.closest('[data-detail-convert]');
          if (convertBtn && state.detailCurrency) {
            state.converter.from = state.detailCurrency;
            state.converter.to = state.baseCurrency;
            persistConverterPrefs();
            openConverterSheet(true);
            return;
          }

          const retryBtn = event.target.closest('[data-detail-retry]');
          if (retryBtn && state.detailCurrency) {
            loadDetailHistory(state.detailCurrency, true);
          }
        });

        refs.converterBody.addEventListener('click', (event) => {
          const backBtn = event.target.closest('[data-converter-back]');
          if (backBtn) {
            state.converter.pickerTarget = null;
            state.converter.search = '';
            renderConverterBody();
            focusAmountInputSoon();
            return;
          }

          const pickerOpen = event.target.closest('[data-picker-open]');
          if (pickerOpen) {
            state.converter.pickerTarget = pickerOpen.dataset.pickerOpen;
            state.converter.search = '';
            renderConverterBody();
            return;
          }

          const swapBtn = event.target.closest('[data-swap]');
          if (swapBtn) {
            const nextFrom = state.converter.to;
            state.converter.to = state.converter.from;
            state.converter.from = nextFrom;
            persistConverterPrefs();
            renderConverterBody();
            focusAmountInputSoon();
            return;
          }

          const pickRow = event.target.closest('[data-converter-code]');
          if (pickRow && state.converter.pickerTarget) {
            const code = pickRow.dataset.converterCode;
            if (state.converter.pickerTarget === 'from') state.converter.from = code;
            if (state.converter.pickerTarget === 'to') state.converter.to = code;
            persistConverterPrefs();
            state.converter.pickerTarget = null;
            state.converter.search = '';
            renderConverterBody();
            focusAmountInputSoon();
          }
        });

        refs.converterBody.addEventListener('input', (event) => {
          if (event.target.matches('[data-amount-input]')) {
            state.converter.amount = event.target.value;
            persistConverterPrefs();
            updateConverterResultOnly();
          }

          if (event.target.matches('[data-converter-search]')) {
            state.converter.search = event.target.value || '';
            renderConverterBody();
            focusConverterSearchSoon();
          }
        });

        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape') {
            closeAllOverlays();
          }
        });

        window.addEventListener('beforeinstallprompt', (event) => {
          console.info('[PWA] beforeinstallprompt fired', {
            secureContext: state.install.secureContext,
            installed: state.install.installed
          });
          event.preventDefault();
          state.install.deferredPrompt = event;
          state.install.available = !state.install.installed;
          syncInstallButton();
        });

        window.addEventListener('appinstalled', () => {
          console.info('[PWA] appinstalled fired');
          state.install.installed = true;
          state.install.available = false;
          state.install.deferredPrompt = null;
          syncInstallButton();
        });
      }

      function syncInstallButton() {
        const shouldShow = state.install.available && !state.install.installed && Boolean(state.install.deferredPrompt);
        refs.installAppBtn.hidden = !shouldShow;
        if (refs.installDiagnostics) {
          refs.installDiagnostics.textContent = getInstallDiagnosticsMessage(shouldShow);
        }
      }

      function getInstallDiagnosticsMessage(promptAvailable) {
        const secureState = state.install.secureContext ? 'Secure context: yes.' : 'Secure context: no.';

        if (!state.install.secureContext) {
          return `${secureState} Для встановлення відкрийте сайт через HTTPS або localhost.`;
        }

        if (state.install.installed) {
          return `${secureState} Застосунок уже встановлено.`;
        }

        if (promptAvailable) {
          return `${secureState} Install prompt готовий.`;
        }

        return `${secureState} Якщо prompt не з'явився, скористайтеся меню Chrome: Install app / Add to Home screen.`;
      }

      async function onInstallButtonClick() {
        const promptEvent = state.install.deferredPrompt;
        if (!promptEvent || state.install.installed) return;

        promptEvent.prompt();

        try {
          const choice = await promptEvent.userChoice;
          console.info('[PWA] userChoice', choice);
        } finally {
          state.install.available = false;
          state.install.deferredPrompt = null;
          syncInstallButton();
        }
      }

      function isRunningAsInstalledApp() {
        const standaloneMedia = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches;
        const iosStandalone = window.navigator.standalone === true;
        return standaloneMedia || iosStandalone;
      }

      async function loadCurrentRates(isManual = false) {
        state.error = null;
        if (state.currentRates && isManual) state.refreshing = true;
        if (!state.currentRates) state.loading = true;
        renderHeaderMeta();
        renderCards();

        try {
          const response = await fetch(CURRENT_API, { cache: 'no-store' });
          if (!response.ok) throw new Error('Не вдалося отримати поточні курси.');
          const data = await response.json();
          if (!Array.isArray(data) || !data.length) throw new Error('API НБУ не повернуло курси.');

          const normalized = normalizeRatesArray(data);
          if (!normalized.UAH) normalized.UAH = createUAHRow(data[0]?.exchangedate || formatDisplayDate(new Date()));
          state.currentRates = normalized;
          state.officialDate = pickOfficialDate(normalized);
          state.fetchedAt = new Date();

          ensureBaseAndConverterCurrenciesAreValid();

          try {
            state.previousRates = await fetchPreviousAvailableRates(state.officialDate);
          } catch {
            state.previousRates = null;
          }

          if (state.detailCurrency && state.activeOverlay === 'detail') {
            loadDetailHistory(state.detailCurrency);
          }
        } catch (error) {
          state.error = error?.message || 'Сталася помилка під час завантаження.';
        } finally {
          state.loading = false;
          state.refreshing = false;
          renderHeaderMeta();
          renderBaseChips();
          renderCards();
          renderBaseSheet();
          renderConverterBody();
        }
      }


      async function fetchJsonFlexible(urls, errorMessage) {
        let lastError = null;

        for (const url of urls) {
          try {
            const response = await fetch(url, { cache: 'no-store' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            const trimmed = text.trim();
            if (!trimmed) throw new Error('Порожня відповідь');
            if (trimmed.startsWith('[') || trimmed.startsWith('{')) {
              return JSON.parse(trimmed);
            }
            throw new Error('Відповідь не у JSON');
          } catch (error) {
            lastError = error;
          }
        }

        throw new Error(errorMessage || lastError?.message || 'Не вдалося отримати дані.');
      }

      async function fetchPreviousAvailableRates(officialDate) {
        if (!officialDate) return null;
        const official = parseDisplayDate(officialDate);
        if (!official) return null;

        for (let offset = 1; offset <= 7; offset += 1) {
          const date = new Date(official.getTime());
          date.setDate(date.getDate() - offset);
          let data;
          try {
            data = await fetchJsonFlexible([BY_DATE_API(formatApiDate(date))], 'Не вдалося отримати попередній курс.');
          } catch {
            continue;
          }
          if (Array.isArray(data) && data.length) {
            const normalized = normalizeRatesArray(data);
            normalized.UAH = createUAHRow(data[0]?.exchangedate || formatDisplayDate(date));
            return normalized;
          }
        }
        return null;
      }

      function ensureBaseAndConverterCurrenciesAreValid() {
        const available = getAvailableCodes();
        if (!available.includes(state.baseCurrency)) state.baseCurrency = 'UAH';
        if (!available.includes(state.converter.from)) state.converter.from = 'USD';
        if (!available.includes(state.converter.to)) state.converter.to = state.baseCurrency;
        if (state.converter.from === state.converter.to && available.length > 1) {
          state.converter.to = state.baseCurrency === state.converter.from ? 'UAH' : state.baseCurrency;
        }
        writeLS(STORAGE_KEYS.base, state.baseCurrency);
        persistConverterPrefs();
      }

      function setBaseCurrency(code) {
        if (!state.currentRates || !code || code === state.baseCurrency) return;
        state.baseCurrency = code;
        writeLS(STORAGE_KEYS.base, code);
        renderBaseChips();
        renderHeaderMeta();
        renderCards();
        renderConverterBody();

        if (state.detailCurrency && state.activeOverlay === 'detail') {
          loadDetailHistory(state.detailCurrency);
        }
      }

      function openBaseSheet() {
        if (!state.currentRates) return;
        closeAllOverlays('base');
        state.baseSearch = '';
        refs.baseSearch.value = '';
        refs.baseSearch.blur();
        state.activeOverlay = 'base';
        syncOverlayState();
        renderBaseSheet();
      }

      function closeBaseSheet() {
        if (state.activeOverlay !== 'base') return;
        state.activeOverlay = null;
        syncOverlayState();
      }

      function openDetailSheet(code) {
        if (!state.currentRates || !code) return;
        closeAllOverlays('detail');
        state.detailCurrency = code;
        state.detailPeriod = state.detailPeriod || '1M';
        state.detailError = null;
        state.detailLoading = true;
        state.detailSeries = [];
        state.chartActiveIndex = null;
        state.activeOverlay = 'detail';
        refs.detailBody.scrollTop = 0;
        renderDetailBody();
        syncOverlayState();
        loadDetailHistory(code);
      }

      function closeDetailSheet() {
        if (state.activeOverlay !== 'detail') return;
        state.activeOverlay = null;
        state.chartActiveIndex = null;
        syncOverlayState();
      }

      function openConverterSheet(fromDetail = false) {
        if (!state.currentRates) return;
        closeAllOverlays('converter');
        state.converter.pickerTarget = null;
        state.converter.search = '';
        state.converter.amount = '';
        if (!fromDetail && state.converter.to === state.converter.from) {
          state.converter.to = state.baseCurrency === state.converter.from ? 'UAH' : state.baseCurrency;
        }
        refs.converterBody.scrollTop = 0;
        state.activeOverlay = 'converter';
        renderConverterBody();
        syncOverlayState();
        persistConverterPrefs();
        focusAmountInputSoon();
      }

      function closeConverterSheet() {
        if (state.activeOverlay !== 'converter') return;
        state.activeOverlay = null;
        state.converter.pickerTarget = null;
        state.converter.search = '';
        syncOverlayState();
      }

      function closeAllOverlays(except = null) {
        if (except !== 'base') refs.baseSheet.style.transform = '';
        if (except !== 'detail') refs.detailSheet.style.transform = '';
        if (except !== 'converter') refs.converterSheet.style.transform = '';
        if (except === null) state.activeOverlay = null;
        if (except === 'base' && state.activeOverlay !== 'base') state.activeOverlay = null;
        if (except === 'detail' && state.activeOverlay !== 'detail') state.activeOverlay = null;
        if (except === 'converter' && state.activeOverlay !== 'converter') state.activeOverlay = null;
        syncOverlayState();
      }

      function syncOverlayState() {
        const map = {
          base: refs.baseOverlay,
          detail: refs.detailOverlay,
          converter: refs.converterOverlay
        };

        Object.entries(map).forEach(([key, overlay]) => {
          const open = state.activeOverlay === key;
          overlay.classList.toggle('open', open);
          overlay.setAttribute('aria-hidden', open ? 'false' : 'true');
        });
      }

      function renderHeaderMeta() {
        if (state.loading && !state.currentRates) {
          refs.headerMeta.textContent = 'Оновлення даних…';
          return;
        }
        if (state.error && !state.currentRates) {
          refs.headerMeta.textContent = 'Не вдалося отримати курси НБУ';
          return;
        }
        const synced = state.fetchedAt ? formatTime(state.fetchedAt) : '—';
        const official = state.officialDate ? `курс на ${state.officialDate}` : 'дата НБУ недоступна';
        const suffix = state.refreshing ? ' · оновлення…' : '';
        refs.headerMeta.textContent = `Оновлено ${synced} · курс ${official}${suffix}`;
        refs.baseContext.innerHTML = `Курси відносно <strong>${escapeHtml(state.baseCurrency)}</strong>`;
      }

      function renderViewToggle() {
        if (!refs.viewModeToggle) return;
        refs.viewModeToggle.querySelectorAll('[data-view-mode]').forEach((btn) => {
          const active = btn.dataset.viewMode === state.viewMode;
          btn.classList.toggle('active', active);
          btn.setAttribute('aria-selected', active ? 'true' : 'false');
        });
      }

      function setViewMode(mode) {
        if (!['currencies', 'metals'].includes(mode) || mode === state.viewMode) return;
        state.viewMode = mode;
        writeLS(STORAGE_KEYS.viewMode, mode);
        renderViewToggle();
        renderCards();
      }

      function renderBaseChips() {
        const chips = [];
        const selectedNonQuick = state.baseCurrency && !QUICK_BASES.includes(state.baseCurrency) ? state.baseCurrency : null;
        if (selectedNonQuick) {
          chips.push(renderChip(selectedNonQuick, true));
        }
        QUICK_BASES.forEach((code) => chips.push(renderChip(code, state.baseCurrency === code)));
        chips.push(`<button type="button" class="chip ${selectedNonQuick ? 'active' : ''}" data-chip-action="more">Ще</button>`);
        refs.baseChips.innerHTML = chips.join('');
      }

      function renderChip(code, active) {
        return `<button type="button" class="chip ${active ? 'active' : ''}" data-chip-action="set" data-code="${escapeAttr(code)}">${escapeHtml(code)}</button>`;
      }

      function renderCards() {
        if (state.loading && !state.currentRates) {
          refs.cardsList.innerHTML = renderSkeletonCards();
          return;
        }

        if (state.error && !state.currentRates) {
          refs.cardsList.innerHTML = `
            <article class="state-card" role="alert">
              <h2>Не вдалося завантажити курси</h2>
              <p>${escapeHtml(state.error)}</p>
              <div class="state-actions">
                <button class="retry-btn" type="button" data-card-retry>Спробувати знову</button>
              </div>
            </article>
          `;
          const retry = refs.cardsList.querySelector('[data-card-retry]');
          retry?.addEventListener('click', () => loadCurrentRates(true));
          return;
        }

        if (!state.currentRates) {
          refs.cardsList.innerHTML = `
            <article class="empty-card">
              <h2>Немає даних</h2>
              <p>Поточні курси ще не доступні.</p>
            </article>
          `;
          return;
        }

        const cards = getDisplayCards();
        if (!cards.length) {
          refs.cardsList.innerHTML = `
            <article class="empty-card">
              <h2>${state.viewMode === 'metals' ? 'Немає металів для показу' : 'Немає валют для показу'}</h2>
              <p>${state.viewMode === 'metals' ? 'Спробуй оновити дані НБУ.' : 'Спробуй змінити базову валюту або оновити дані.'}</p>
            </article>
          `;
          return;
        }

        refs.cardsList.innerHTML = cards.map((row) => {
          const rate = getCrossRate(row.cc, state.baseCurrency, state.currentRates);
          const change = getDailyChange(row.cc, state.baseCurrency);
          const deltaClass = change ? (change.absolute > 0 ? 'up' : change.absolute < 0 ? 'down' : '') : '';
          const deltaSign = change ? (change.absolute > 0 ? '↗' : change.absolute < 0 ? '↘' : '•') : '•';
          const deltaText = change
            ? `${deltaSign} ${formatSignedPercent(change.percent)}`

          return `
            <button class="currency-card" type="button" data-card-code="${escapeAttr(row.cc)}" aria-label="Відкрити ${escapeAttr(row.txt)}">

                </div>

                  <div class="delta-caption">Зміна за день</div>
                </div>
              </div>
            </button>
          `;
        }).join('');
      }

      function renderBaseSheet() {
        if (!state.currentRates) {
          refs.baseOptions.innerHTML = `
            <article class="inline-state">
              <h3>Немає списку валют</h3>

            return hay.includes(query);

            </article>
          `;

        }

        refs.baseOptions.innerHTML = list.map((row) => `
          <button type="button" class="list-row ${state.baseCurrency === row.cc ? 'active' : ''}" data-base-code="${escapeAttr(row.cc)}">

            <div class="row-tag">${state.baseCurrency === row.cc ? 'Активна' : ''}</div>

      function renderConverterBody() {

          : 'Розрахунок через поточні курси НБУ';

          });
          const selectedCode = state.converter[state.converter.pickerTarget];
          refs.converterBody.innerHTML = `
            <div class="picker-view">

                <div class="picker-title-block">
                  <h3 class="picker-title">${state.converter.pickerTarget === 'from' ? 'Валюта “з”' : 'Валюта “в”'}</h3>
